<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnlineChat — Ingresar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo"></div>
    <h1>OnlineChat</h1>
    <p class="login-subtitle">Ingresa tu nombre para unirte</p>

    <form id="loginForm" autocomplete="off">
      <input
        id="usernameInput"
        type="text"
        placeholder="Tu nombre de usuario"
        maxlength="30"
        required
        autofocus
      />
      <div id="loginError" class="error-message"></div>
      <button type="submit" id="joinBtn">Entrar al chat →</button>
    </form>

    <p class="login-note">No se necesita contraseña</p>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('usernameInput');
    const errorEl = document.getElementById('loginError');

    loginForm.addEventListener('submit', function (e) {
      e.preventDefault();
      const username = usernameInput.value.trim();
      if (!username) return;

      // Expresión regular para detectar etiquetas HTML
      const htmlTagRegex = /<[a-zA-Z/][^>]*>/i;
      if (htmlTagRegex.test(username)) {
        errorEl.textContent = 'El nombre no puede contener etiquetas HTML.';
        errorEl.style.display = 'block';
        usernameInput.style.borderColor = '#ef4444';
        usernameInput.focus();
        return;
      }

      // Guardar en sessionStorage y redirigir
      sessionStorage.setItem('chat_username', username);
      window.location.href = 'chat.html';
    });

    usernameInput.addEventListener('input', function () {
      errorEl.style.display = 'none';
      errorEl.textContent = '';
      usernameInput.style.borderColor = '';
    });
  </script>
</body>
</html>
